name: Deploy Kirby to Cloudways

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Cloudways
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.CLOUDWAYS_HOST }}
          username: ${{ secrets.CLOUDWAYS_USER }}
          key: ${{ secrets.CLOUDWAYS_SSH_KEY }}
          script: |
            git config --global --add safe.directory /home/941598.cloudwaysapps.com/kbpsfjgpxg/git_repo

            cd ~/applications/kbpsfjgpxg/git_repo
            git pull origin main

            rsync -rlz --delete --no-perms --no-owner --no-group \
              --exclude='.git' \
              --exclude='vendor' \
              --exclude='site/accounts' \
              --exclude='site/cache' \
              --exclude='site/sessions' \
              --exclude='media' \
              ./ ../public_html/